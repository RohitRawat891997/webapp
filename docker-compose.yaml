# Docker Compose file for Monitoring & Logging Stack
# Components:
# - WebApp (Nginx)
# - Node Exporter (Host Metrics)
# - cAdvisor (Container Metrics)
# - Prometheus (Metrics Collection)
# - Grafana (Visualization)
# - Loki (Log Storage)
# - Promtail (Log Collection)

# -----------------------------
# Docker Network
# -----------------------------
# All containers communicate over this bridge network.
# Services can reach each other using service names
# (e.g., prometheus -> node-exporter:9100).
networks:
  monitoring:
    driver: bridge

# -----------------------------
# Persistent Storage
# -----------------------------
# Named volumes preserve data even if containers are recreated.
volumes:
  prometheus_data: {}   # Stores Prometheus time-series metrics
  grafana_storage: {}   # Stores Grafana dashboards, users & settings
  loki_data: {}         # Stores Loki log data

services:

  # ==========================================================
  # Web Application
  # ==========================================================
  webapp:
    image: rohitrawat891997/nginx:latest
    container_name: webapp
    restart: unless-stopped

    # Host Port : Container Port
    ports:
      - "80:8080"

    networks:
      - monitoring

  # ==========================================================
  # Node Exporter
  # Collects Host Machine Metrics
  # CPU, RAM, Disk, Network, Filesystem
  # ==========================================================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped

    # Mount host directories as Read-Only
    # so Node Exporter can collect OS metrics.
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

    command:
      # Location of host /proc filesystem
      - '--path.procfs=/host/proc'

      # Location of host root filesystem
      - '--path.rootfs=/rootfs'

      # Location of host /sys filesystem
      - '--path.sysfs=/host/sys'

      # Ignore virtual filesystems
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

    # Only available to containers
    expose:
      - 9100

    networks:
      - monitoring

  # ==========================================================
  # Prometheus
  # Scrapes metrics from exporters and stores them.
  # ==========================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped

    volumes:
      # Prometheus configuration file
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml

      # Persistent metrics storage
      - prometheus_data:/prometheus

    command:
      # Configuration file path
      - '--config.file=/etc/prometheus/prometheus.yml'

      # Database storage location
      - '--storage.tsdb.path=/prometheus'

      # Console UI files
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'

      # Allows configuration reload without restarting
      - '--web.enable-lifecycle'

    ports:
      - "9090:9090"

    networks:
      - monitoring

    # Start cAdvisor before Prometheus
    depends_on:
      - cadvisor

  # ==========================================================
  # cAdvisor
  # Collects Docker Container Metrics
  # CPU, Memory, Network, Filesystem
  # ==========================================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped

    ports:
      - "8080:8080"

    volumes:
      # Host root filesystem
      - /:/rootfs:ro

      # Docker runtime information
      - /var/run:/var/run:rw

      # Host system information
      - /sys:/sys:ro

      # Docker metadata
      - /var/lib/docker/:/var/lib/docker:ro

    networks:
      - monitoring

  # ==========================================================
  # Grafana
  # Visualization Dashboard
  # Connects to Prometheus and Loki
  # ==========================================================
  grafana:
    image: grafana/grafana-enterprise
    container_name: grafana
    restart: unless-stopped

    ports:
      - "3000:3000"

    volumes:
      # Stores dashboards, users, alerts and data sources
      - grafana_storage:/var/lib/grafana

    networks:
      - monitoring

  # ==========================================================
  # Loki
  # Centralized Log Storage
  # ==========================================================
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped

    ports:
      - "3100:3100"

    volumes:
      # Loki configuration
      - ./loki-config.yaml:/etc/loki/config.yaml:ro

      # Persistent log storage
      - loki_data:/loki

    command: -config.file=/etc/loki/config.yaml

    networks:
      - monitoring

  # ==========================================================
  # Promtail
  # Collects Docker Logs and Sends Them to Loki
  # ==========================================================
  promtail:
    image: grafana/promtail:3.0.0
    container_name: promtail
    restart: unless-stopped

    volumes:
      # Promtail configuration
      - ./promtail-config.yaml:/etc/promtail/docker-config.yaml

      # Docker container log files
      - /var/lib/docker/containers:/var/lib/docker/containers:ro

      # Docker socket for service discovery
      - /var/run/docker.sock:/var/run/docker.sock

    command: -config.file=/etc/promtail/docker-config.yaml

    # Start Loki before Promtail
    depends_on:
      - loki

    networks:
      - monitoring
